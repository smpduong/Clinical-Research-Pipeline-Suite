name: CI

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with coverage
      run: |
        pytest python/tests/ -v --cov=python/src --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  test-r:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.4'
        use-public-rspm: true

    - name: Install R dependencies
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        # Only the packages r/tests/test_cgm_processor.R actually loads
        # (via src/cgm_processor.R): dplyr, tidyr, lubridate, zoo, testthat.
        # Avoid pulling in tidyverse/lme4/digest here — the test suite never
        # sources the playbook scripts that use them, and including them
        # drags in Suggests (car -> lme4 -> gamm4, which needs R >= 4.4)
        # that can deadlock the dependency solver on older R.
        packages: |
          any::dplyr
          any::tidyr
          any::lubridate
          any::zoo
          any::testthat
        needs: check

    - name: Run R tests
      run: |
        Rscript -e "testthat::test_dir('r/tests')"

  lint-python:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        pip install flake8==7.3.0 black==26.5.1 isort==8.0.1

    - name: Check formatting with black
      run: black --check python/

    - name: Check import sorting
      run: isort --check-only python/

    - name: Lint with flake8
      run: flake8 python/ --max-line-length=100 --extend-ignore=E203,W503
